<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキスト変形ツール</title>
    <style>
        body { background: #1a1a1a; color: #eee; padding: 20px; }
        /* ここが重要：等幅フォントを強制し、文字間隔を揃える */
				#output {
				    white-space: pre;
				    font-family: "MS Gothic", "Osaka-Mono", monospace;
				    font-size: clamp(12px, 4vw, 18px); /* 画面幅に応じて12px〜18pxで自動調整 */
				    line-height: 1.2;
				    background: #000;
				    padding: 15px;
				    border: 1px solid #555;
				    overflow-x: auto; /* はみ出たらスクロール */
				    max-width: 100vw;
				    box-sizing: border-box;
				}

    </style>
</head>
<body>
    <textarea id="input" rows="3" cols="30">日本語テキストです</textarea>
    <select id="mode">
        <option value="vertical">縦書き</option>
        <option value="diagonal">斜め</option>
        <option value="spiral">うずまき</option>
    </select>
    <button onclick="transform()">変換</button>
    <div id="output"></div>
		<button onclick="copyToClipboard()">結果をコピー</button>

    <script>
        function transform() {
            const text = document.getElementById('input').value;
            const mode = document.getElementById('mode').value;
            const output = document.getElementById('output');
            
            let result = "";
            if (mode === 'vertical') {
                result = verticalTransform(text);

            } else if (mode === 'diagonal') {
								result = diagonalTransform(text);

            } else if (mode === 'spiral') {
                result = spiralTransform(text);

            }
            output.textContent = result;
        }

				// 全角変換の際に、文字間にスペースを挿入するオプション
				function toFullWidth(str, addSpace = false) {
				    let converted = str.replace(/[\u0020-\u007e]/g, (s) => {
				        return String.fromCharCode(s.charCodeAt(0) + 0xFEE0);
				    }).replace(/[\uff61-\uff9f]/g, (s) => {
				        const half = "｡｢｣､･ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝﾞﾟ";
				        const full = "。「」、・ヲァィゥェォャュョッーアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン゛゜";
				        const idx = half.indexOf(s);
				        return idx > -1 ? full[idx] : s;
				    });
				    
				    return addSpace ? converted.split('').join(' ') : converted;
				}

				function verticalTransform(text) {
				    // 全角に変換してから、改行で分割
				    const columns = text.split('\n').map(col => toFullWidth(col));
				    
				    const maxLen = Math.max(...columns.map(col => col.length));
				    
				    let result = "";
				    for (let i = 0; i < maxLen; i++) {
				        let rowStr = "";
				        // 右から左へ（jを逆順に）
				        for (let j = columns.length - 1; j >= 0; j--) {
				            rowStr += (columns[j][i] || "　");
				        }
				        result += rowStr + "\n";
				    }
				    return result;
				}

				function diagonalTransform(text) {
				    const fullText = toFullWidth(text.replace(/\n/g, ''));
				    let rows = [];
				    
				    // 1. 文字を階段状に分配する
				    // 1文字目 → 0行目
				    // 2文字目 → 0行目, 3文字目 → 1行目
				    // 4文字目 → 0行目, 5文字目 → 1行目, 6文字目 → 2行目...
				    let currentLine = 0;
				    let countInLine = 0;
				    let maxLineReached = 0;

				    for (let char of fullText) {
				        if (!rows[currentLine]) rows[currentLine] = "";
				        rows[currentLine] += char;
				        
				        // 次の行へ移動
				        currentLine++;
				        // もし行が足りなくなったら0行目に戻る
				        if (currentLine > maxLineReached) {
				            maxLineReached++;
				            currentLine = 0;
				        }
				    }

				    // 2. パディング処理（エラー回避版）
				    const maxLen = rows[0].length; // 0行目が一番長いはず
				    return rows.map(r => {
				        const diff = maxLen - r.length;
				        return r + (diff > 0 ? "　".repeat(diff) : "");
				    }).join('\n');
				}


				function spiralTransform(text) {
				    const fullText = toFullWidth(text.replace(/\n/g, ''));
				    const n = Math.ceil(Math.sqrt(fullText.length));
				    const grid = Array.from({ length: n }, () => Array(n).fill('　'));
				    
				    let top = 0, bottom = n - 1, left = 0, right = n - 1;
				    let index = 0;

				    while (top <= bottom && left <= right && index < fullText.length) {
				        // 右へ
				        for (let i = left; i <= right && index < fullText.length; i++) grid[top][i] = fullText[index++];
				        top++;
				        // 下へ
				        for (let i = top; i <= bottom && index < fullText.length; i++) grid[i][right] = fullText[index++];
				        right--;
				        // 左へ
				        for (let i = right; i >= left && index < fullText.length; i--) grid[bottom][i] = fullText[index++];
				        bottom--;
				        // 上へ
				        for (let i = bottom; i >= top && index < fullText.length; i--) grid[i][left] = fullText[index++];
				        left++;
				    }
				    return grid.map(row => row.join('')).join('\n');
				}


				function copyToClipboard() {
				    const text = document.getElementById('output').textContent;
				    navigator.clipboard.writeText(text).then(() => {
				        alert("コピーしました！");
				    });
				}

    </script>
</body>
</html>
