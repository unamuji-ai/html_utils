<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #666; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #controls { width: 100%; padding: 10px; background: #111; }
        #textInput { width: 100%; font-size: 20px; padding: 10px; box-sizing: border-box; }
        canvas { flex-grow: 1; width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div id="controls">
        <input type="text" id="textInput" value="IMPACT" maxlength="8" placeholder="8文字まで入力">
    </div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const input = document.getElementById('textInput');
        
        function resize() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 【修正】色相が一周し、かつ明度が山なりになる18色パレット
        const colors = Array.from({length: 18}, (_, i) => {
            const h = (i * 360 / 18);
            // i=0(明度50) -> i=4.5(明度70) -> i=9(明度50) -> i=13.5(明度30) -> i=18(明度50)
            const l = 50 + Math.sin((i / 18) * Math.PI * 2) * 20;
            return `hsl(${h}, 80%, ${Math.round(l)}%)`;
        });

        let frame = 0;
        let totalFrames = 0;
        let lastTime = 0;
        const interval = 48;

        function draw(timestamp) {
            if (timestamp - lastTime > interval) {
                frame = (frame + 1) % 18;
                totalFrames++;
                lastTime = timestamp;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const text = input.value || " ";
            const count = 2;
            const isLandscape = canvas.width > canvas.height;
            
            const longSide = isLandscape ? canvas.width : canvas.height;
            const shortSide = isLandscape ? canvas.height : canvas.width;
            const fontSize = Math.min(longSide / (count * 8), shortSide * 0.3);
            
            ctx.font = `bold ${fontSize}px sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const off = fontSize * 0.05;
            const edgeCycle = Math.floor(totalFrames / 72) % 4;

            for (let i = 0; i < count; i++) {
                const x = isLandscape ? (canvas.width / count) * (i + 0.5) : canvas.width / 2;
                const y = isLandscape ? canvas.height / 2 : (canvas.height / count) * (i + 0.5);
                
                const idx = (frame) % 18;
                const nextIdx = (idx + 1) % 18;

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(Math.PI / 2);

                ctx.fillStyle = colors[idx];
                ctx.fillText(text, 0, -off);
                ctx.fillText(text, 0, off);
                ctx.fillText(text, -off, 0);
                ctx.fillText(text, off, 0);

                ctx.fillStyle = colors[nextIdx];
                if (edgeCycle === 0) ctx.fillText(text, off, 0);
                else if (edgeCycle === 1) ctx.fillText(text, -off, 0);
                else if (edgeCycle === 2) ctx.fillText(text, 0, -off);
                else if (edgeCycle === 3) ctx.fillText(text, 0, off);

                ctx.fillStyle = colors[idx];
                ctx.fillText(text, 0, 0);
                ctx.restore();
            }
            requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
    </script>
</body>
</html>
