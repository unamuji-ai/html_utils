<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ロビー | Landmine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, onDisconnect, update, runTransaction, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyACl4sZP_d86CuMiJOqLr_qvRRIyu1cHWo",
            databaseURL: "https://landmine-fe71d-default-rtdb.firebaseio.com"
        }), "https://landmine-fe71d-default-rtdb.firebaseio.com");

        const roomId = new URLSearchParams(window.location.search).get('room');
        const savedName = sessionStorage.getItem('landmine_name');

        // 1. 名前入力状態の制御
        if (savedName) {
            document.getElementById('name-area').style.display = 'none';
            if (!roomId) {
                document.getElementById('create-btn').style.display = 'block';
            } else {
                joinRoom(savedName);
            }
        }

        document.getElementById('set-name-btn').onclick = () => {
            const name = document.getElementById('name-input').value.trim();
            if (!name) return alert("名前を入力");
            sessionStorage.setItem('landmine_name', name);
            location.reload();
        };

        document.getElementById('create-btn').onclick = () => {
            const newRoomRef = push(ref(db, 'rooms'));
            window.location.href = `lobby.html?room=${newRoomRef.key}`;
        };

        function joinRoom(myName) {
            document.getElementById('room-info').style.display = 'block';
            const roomRef = ref(db, `rooms/${roomId}`);
            const myPlayerRef = push(ref(db, `rooms/${roomId}/players`));
            const myPlayerKey = myPlayerRef.key;

            set(myPlayerRef, { name: myName });
            
            // 離脱時：プレイヤー削除 ＋ ホストならホストIDをnullにする
            onDisconnect(myPlayerRef).remove();
            onDisconnect(ref(db, `rooms/${roomId}/hostId`)).set(null);

            document.getElementById('room-url').value = window.location.href;
            new QRCode(document.getElementById("qrcode"), window.location.href);

            // ホスト選出ロジック (空なら立候補)
            onValue(ref(db, `rooms/${roomId}/hostId`), (snap) => {
                if (!snap.val()) {
                    runTransaction(ref(db, `rooms/${roomId}/hostId`), (curr) => curr || myPlayerKey);
                }
            });

            // ゲーム開始監視
            onValue(ref(db, `rooms/${roomId}/status`), (snap) => {
                if (snap.val() === 'started') window.location.href = `landmine.html?room=${roomId}&uid=${myPlayerKey}`;
            });

            // UI更新
            onValue(roomRef, (snap) => {
                const data = snap.val();
                if (!data) return;

						    // プレイヤーリストを配列化してカウント
						    const playersArray = Object.entries(data.players || {});
						    document.getElementById('player-list').innerHTML = playersArray.map(([k, v]) => 
						        `<li>${v.name}${k === data.hostId ? " (Host)" : ""}</li>`
						    ).join('');
						    
						    // ホストかつ、プレイヤーが2人以上の場合のみボタンを表示
						    const isHost = (data.hostId === myPlayerKey);
						    const hasBtn = document.getElementById('start-btn');

						    // 条件：ホストである かつ プレイヤーが2人以上 かつ まだボタンがない
						    if (isHost && playersArray.length >= 2 && !hasBtn) {
						        const btn = document.createElement('button');
						        btn.id = 'start-btn'; 
						        btn.textContent = "ゲーム開始";
						        btn.onclick = async () => {
						            await set(ref(db, `rooms/${roomId}/game/players`), data.players);
						            await update(roomRef, { status: 'started' });
						        };
						        document.body.appendChild(btn);
						    } 
						    // 条件に満たなくなった場合（例えば誰かが抜けて1人になった場合）ボタンを消す
						    else if (hasBtn && (playersArray.length < 2 || !isHost)) {
						        hasBtn.remove();
						    }
            });
        }
    </script>
</head>
<body>
    <h1>Landmine ロビー</h1>
    <div id="name-area">名前: <input id="name-input"><button id="set-name-btn">決定</button></div>
    <button id="create-btn" style="display:none;">部屋を作成する</button>
    
    <div id="room-info" style="display:none;">
        <p>招待URL: <input id="room-url" readonly> <button onclick="document.getElementById('room-url').select();document.execCommand('copy')">コピー</button></p>
        <div id="qrcode"></div>
        <ul id="player-list"></ul>
    </div>
</body>
</html>
