<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<!-- iOS用 -->
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<meta name="apple-mobile-web-app-title" content="EyeMask">

		<!-- Android用 -->
		<meta name="mobile-web-app-capable" content="yes">

    <title>Digital Eye Mask</title>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; transition: background 0.2s; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #settingsPanel {
            position: absolute; top: 0; right: -250px; width: 250px; height: 100vh;
            background: rgba(50, 50, 50, 0.9); color: white; padding: 20px;
            transition: right 0.3s; z-index: 10; box-sizing: border-box;
        }
        #settingsPanel.open { right: 0; }
        .control-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; }
        input[type="range"] { width: 100%; }
    </style>
</head>
<body>
		<!-- 描画領域のコンテナ内に配置 -->
		<div id="canvasContainer" style="position: relative;">
		    <!-- 既存のcanvas要素など -->
		    <canvas id="canvas"></canvas>
		    <div id="settingsPanel">
		        <div class="control-group">
		            <label>背景色</label>
								<input type="color" id="bgColor" value="#f1c27d">
		        </div>
		        <div class="control-group">
		            <label>目の大きさ</label>
		            <input type="range" id="eyeSize" min="0.5" max="2.5" step="0.1" value="1.4">
		        </div>
		        <div class="control-group">
		            <label>目の間隔</label>
		            <input type="range" id="eyeGap" min="0.5" max="2.5" step="0.1" value="1.8">
		        </div>
						<div class="control-group">
						    <label>表示テキスト:</label>
						    <input type="text" id="textInput" placeholder="文字を入力...">
						</div>
						<div class="control-group">
						    <label>最大透明度:</label>
						    <select id="opacitySelect">
						        <option value="0.1">0.1</option>
						        <option value="0.3">0.3</option>
						        <option value="0.5" selected>0.5</option>
						        <option value="0.7">0.7</option>
						    </select>
						</div>

		        <button onclick="togglePanel()">閉じる</button>
		    </div>
		    <div style="position:absolute; top:10px; right:10px; color:white; font-size: 24px; cursor:pointer;" onclick="togglePanel()">⚙️</div>
		    
		    <!-- 追加するテキスト表示用要素 -->
		    <div id="floatingText" style="position: absolute; display: none; pointer-events: none; transform: rotate(90deg); transform-origin: center; color: white; font-weight: bold; z-index: 10;">
				</div>
		</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let w, h, tiltX = 0, tiltY = 0;
let settings = { bgColor: '#f1c27d', size: 1.4, gap: 1.8 };
document.body.style.backgroundColor = settings.bgColor;

function togglePanel() { document.getElementById('settingsPanel').classList.toggle('open'); }
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; w = canvas.width; h = canvas.height; }
window.addEventListener('resize', resize);
resize();


let blinkTimer = 0; // まばたき用タイマー
let wanderX = 0, wanderY = 0; // 勝手に動く眼球用
let blinkProgress = 0; // 0:開, 1:閉
let isBlinking = false;

function updateAnimation() {
    // まばたき開始判定
    if (!isBlinking && Math.random() < 0.02) {
        isBlinking = true;
    }

    if (isBlinking) {
        if (blinkProgress < 1) blinkProgress += 0.2; // 閉じる速度
        else {
            blinkProgress = 1;
            isBlinking = false; // 開き始める
        }
    } else {
        if (blinkProgress > 0) blinkProgress -= 0.1; // 開く速度
    }
}

// 追加：眼球の目標位置と現在の位置
let targetX = 0, targetY = 0;
let currentX = 0, currentY = 0;

// 離散的に視線を動かす処理（0.5秒〜2秒おきにランダムに）
function updateGaze() {
    targetX = (Math.random() - 0.5) * 0.5; // 左右の動き
    targetY = (Math.random() - 0.5) * 0.3; // 上下の動き
    setTimeout(updateGaze, 500 + Math.random() * 1500);
}
updateGaze();

// --- 修正後の drawEye 関数 ---
function drawEye(cx, cy, isHorizontal) {
    const baseRadiusX = Math.min(w, h) * 0.20 * settings.size;
    const baseRadiusY = Math.min(w, h) * 0.12 * settings.size;
    
    // 視線の補間（離散的な動きのみ使用）
    currentX += (targetX - currentX) * 0.2;
    currentY += (targetY - currentY) * 0.2;

    ctx.save();
    ctx.translate(cx, cy);
    if (!isHorizontal) ctx.rotate(Math.PI / 2);

    // 1. 白目
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(0, 0, baseRadiusX, baseRadiusY, 0, 0, Math.PI * 2);
    ctx.fill();

    // 2. 眼球（虹彩・瞳孔）
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(0, 0, baseRadiusX, baseRadiusY, 0, 0, Math.PI * 2);
    ctx.clip();

    // ジャイロの変数を 0 に固定し、離散的な動き(currentX/Y)のみ反映
    const offsetX = (currentX * 100); 
    const offsetY = (currentY * 100);

    const grad = ctx.createRadialGradient(offsetX, offsetY, baseRadiusY * 0.2, offsetX, offsetY, baseRadiusY * 0.8);
    grad.addColorStop(0, '#4a2c1a'); grad.addColorStop(1, '#8b5a2b');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.ellipse(offsetX, offsetY, baseRadiusY * 0.8, baseRadiusY * 0.8, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(offsetX, offsetY, baseRadiusY * 0.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // 3. 上まぶた
    ctx.fillStyle = settings.bgColor;
    ctx.beginPath();
    const eyelidTop = -baseRadiusY;
    const eyelidHeight = (baseRadiusY * 2) * blinkProgress;
    ctx.rect(-baseRadiusX * 1.2, eyelidTop, baseRadiusX * 2.4, eyelidHeight);
    ctx.fill();

    // 4. ハイライト
    if (blinkProgress < 0.5) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.beginPath();
        ctx.arc(offsetX - baseRadiusY * 0.1, offsetY - baseRadiusY * 0.1, baseRadiusY * 0.2, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

const floatingText = document.getElementById('floatingText');
const textInput = document.getElementById('textInput'); // コントロールパネルの入力欄
const opacitySelect = document.getElementById('opacitySelect');
let isAnimating = false; // アニメーション中かどうかのフラグ
const VERTICAL_MARGIN = 80; // 目の上下から最低限離す距離

function showRandomText() {
    if (isAnimating) return;
    
    const text = textInput.value;
    if (!text) return;

    isAnimating = true;
    const maxOpacity = parseFloat(opacitySelect.value);

    const container = document.getElementById('canvasContainer');
    const rect = container.getBoundingClientRect();
    
    // 目の位置を定義（既存の変数が利用可能と仮定）
    const eyeY = rect.height / 2;
    const eyeLeftX = window.eyeLeftX || (rect.width * 0.4); // フォールバック値
    const eyeRightX = window.eyeRightX || (rect.width * 0.6);
    
    const HORIZONTAL_MARGIN = 60; // 目の横幅を考慮した余白
    const VERTICAL_MARGIN = 80;   // 目の高さ方向の余白

    let randomX, randomY;
    let isOverlapping = true;
    let attempts = 0;

    while (isOverlapping && attempts < 200) {
        randomX = Math.random() * (rect.width - 100) + 50;
        randomY = Math.random() * (rect.height - 100) + 50;
        
        // 判定ロジック：
        // 1. 左右の目の範囲内（eyeLeftX ～ eyeRightX）にあるか？
        // 2. その上で、上下の範囲内（eyeY ± VERTICAL_MARGIN）にあるか？
        const inHorizontalRange = (randomX > (eyeLeftX - HORIZONTAL_MARGIN) && randomX < (eyeRightX + HORIZONTAL_MARGIN));
        const inVerticalRange = Math.abs(randomY - eyeY) < VERTICAL_MARGIN;

        // 目に近い（横範囲内 かつ 縦範囲内）場合は重なっているとみなす
        if (!(inHorizontalRange && inVerticalRange)) {
            isOverlapping = false;
        }
        attempts++;
    }

    floatingText.textContent = text;
    floatingText.style.left = randomX + 'px';
    floatingText.style.top = randomY + 'px';
    floatingText.style.opacity = 0;
    floatingText.style.display = 'block';
    
    // フェードイン処理
    let opacity = 0;
    const fadeIn = setInterval(() => {
        opacity += 0.05;
        if (opacity >= maxOpacity) {
            floatingText.style.opacity = maxOpacity;
            clearInterval(fadeIn);
            setTimeout(() => fadeOut(maxOpacity), 1000);
        } else {
            floatingText.style.opacity = opacity;
        }
    }, 50);
}

function fadeOut(maxOpacity) {
    let opacity = maxOpacity;
    const fadeOutInterval = setInterval(() => {
        opacity -= 0.05;
        if (opacity <= 0) {
            clearInterval(fadeOutInterval);
            floatingText.style.display = 'none';
            isAnimating = false; // アニメーション終了、次を表示可能にする
        } else {
            floatingText.style.opacity = opacity;
        }
    }, 50);
}

// 5秒ごとに実行
setInterval(showRandomText, 2000);


document.getElementById('bgColor').oninput = (e) => { settings.bgColor = e.target.value; document.body.style.backgroundColor = settings.bgColor; };
document.getElementById('eyeSize').oninput = (e) => settings.size = parseFloat(e.target.value);
document.getElementById('eyeGap').oninput = (e) => settings.gap = parseFloat(e.target.value);

function loop() {
    updateAnimation(); // 追加
    ctx.clearRect(0, 0, w, h);
    const isHorizontal = w >= h;
    const longSide = Math.max(w, h);
    const shortSide = Math.min(w, h);
    
    // 目の間隔調整 (gapを適用)
    const centerOffset = (longSide * 0.15) * settings.gap;
    const eyeLeftX = (longSide / 2) - centerOffset;
    const eyeRightX = (longSide / 2) + centerOffset;

    if (isHorizontal) {
        drawEye(eyeLeftX, shortSide / 2, true);
        drawEye(eyeRightX, shortSide / 2, true);
    } else {
        drawEye(shortSide / 2, eyeLeftX, false);
        drawEye(shortSide / 2, eyeRightX, false);
    }
    requestAnimationFrame(loop);
}

document.getElementById('bgColor').oninput = (e) => { 
    settings.bgColor = e.target.value; 
    document.body.style.backgroundColor = settings.bgColor; 
};

loop();
</script>
</body>
</html>
