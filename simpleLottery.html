<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スロットくじ引き</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: space-around; height: 100vh; margin: 0; background: #222; color: #fff; touch-action: manipulation; }
        .reels { display: flex; gap: 5px; }
        .reel { width: 25vh; height: 25vh; max-width: 120px; max-height: 120px; background: #fff; border: 4px solid #666; border-radius: 12px; overflow: hidden; position: relative; }
				/* 修正後のCSS */
				.reel-inner { 
				    position: absolute; width: 100%; 
				    transition: transform 0.5s cubic-bezier(0.1, 0.7, 0.1, 1); 
				}
				.symbol-box { 
				    display: flex; align-items: center; justify-content: center; 
				    height: 120px; /* 親のreelの高さと一致させる */
				    font-size: 80px; 
				}

        .is-seven { color: #e74c3c; font-weight: bold; text-shadow: 0 0 10px #ff0000; }
        .spinning { animation: spin 0.1s linear infinite; }
        @keyframes spin { from { transform: translateY(-1080px); } to { transform: translateY(0); } }
        #draw-btn { padding: 20px 60px; font-size: 24px; cursor: pointer; border-radius: 50px; border: none; background: #e67e22; color: white; font-weight: bold; width: 80%; }
        #draw-btn:disabled { background: #555; }
        #status { font-size: 1.2rem; color: #aaa; }
        #msg { font-size: 1.8rem; font-weight: bold; height: 3rem; }
    </style>
</head>
<body>
    <div id="status"></div>
    <div class="reels">
        <div class="reel"><div id="r1" class="reel-inner"></div></div>
        <div class="reel"><div id="r2" class="reel-inner"></div></div>
        <div class="reel"><div id="r3" class="reel-inner"></div></div>
    </div>
    <div id="msg"></div>
    <button id="draw-btn">くじを引く</button>

    <script>
        const symbols = ['7', '🍒', '🍊', '🥭', '🍉', '🍈', '🪙', '🌎', '🔔'];
        const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];
        const btn = document.getElementById('draw-btn');
        const msg = document.getElementById('msg');
        const status = document.getElementById('status');
        
        let totalPlayers = 0;
        let attemptCount = 0;

        function initGame() {
            if (totalPlayers === 0) {
                while(true){
                    let input = prompt("参加人数を入力してください (1〜8人):");
                    totalPlayers = parseInt(input);
                    if(!isNaN(totalPlayers) && totalPlayers >= 1 && totalPlayers <= 8) break;
                }
            }
            attemptCount = 0;
            msg.textContent = "";
            btn.textContent = "くじを引く";
            btn.disabled = false;
            status.textContent = `参加人数: ${totalPlayers}人`;
            
						reels.forEach(r => {
						    r.innerHTML = symbols.map(s => `<div class="symbol-box ${s === '7' ? 'is-seven' : ''}">${s}</div>`).join('') 
						                + symbols.map(s => `<div class="symbol-box ${s === '7' ? 'is-seven' : ''}">${s}</div>`).join('');
						    r.style.transform = 'none';
						});
        }

        initGame();

        btn.addEventListener('click', async () => {
            if (btn.textContent === "もう一度") { initGame(); return; }
            attemptCount++;
            btn.disabled = true;
            msg.textContent = "抽選中...";
            
            reels.forEach(r => r.classList.add('spinning'));

            let p = (attemptCount <= 2 * totalPlayers) ? 0.2 / totalPlayers : 
                    (attemptCount <= 4 * totalPlayers) ? 0.5 / totalPlayers : 1.0;

            const isWin = Math.random() < p;
            let result = isWin ? ['7', '7', '7'] : 
                         (Math.random() < 0.3) ? [symbols[1], symbols[2], symbols[3]] :
                         (Math.random() < 0.7) ? ['7', symbols[4], symbols[5]] : ['7', '7', symbols[1]];

            const isReach = (result[0] === '7' && result[1] === '7');

            await new Promise(r => setTimeout(r, 1500));
            
            for (let i = 0; i < 3; i++) {
                if (i === 2 && isReach) {
                    await new Promise(r => setTimeout(r, 1000));
                }

                reels[i].classList.remove('spinning');
                const reelHeight = reels[i].parentElement.clientHeight;
                const idx = symbols.indexOf(result[i]);
                reels[i].style.transform = `translateY(-${idx * reelHeight}px)`;

                if(window.navigator.vibrate) window.navigator.vibrate(100);
                await new Promise(r => setTimeout(r, 300));
            }

            if (isWin) { msg.textContent = "🎯 777 大当たり！"; btn.textContent = "もう一度"; btn.disabled = false; }
            else { msg.textContent = "❌ はずれ"; btn.disabled = false; }
        });
    </script>
</body>
</html>
