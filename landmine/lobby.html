<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ロビー | Landmine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, get, set, onDisconnect, update, runTransaction } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACl4sZP_d86CuMiJOqLr_qvRRIyu1cHWo",
            authDomain: "landmine-fe71d.firebaseapp.com",
            databaseURL: "https://landmine-fe71d-default-rtdb.firebaseio.com",
            projectId: "landmine-fe71d",
            storageBucket: "landmine-fe71d.firebasestorage.app",
            messagingSenderId: "30780557345",
            appId: "1:30780557345:web:867cdc81b4d20cb43bbb60"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');

        // UI要素
        const nameArea = document.getElementById('name-area');
        const createArea = document.getElementById('create-area');
        const roomInfo = document.getElementById('room-info');
        const nameInput = document.getElementById('name-input');
        const setNameBtn = document.getElementById('set-name-btn');

		    window.onload = () => {
		        const urlParams = new URLSearchParams(window.location.search);
		        const roomId = urlParams.get('room');
		        const savedName = sessionStorage.getItem('landmine_name');

		        // 各UIパーツの取得
		        const nameArea = document.getElementById('name-area');
		        const createArea = document.getElementById('create-area');
		        const roomInfo = document.getElementById('room-info');
		        const nameInput = document.getElementById('name-input');
		        const setNameBtn = document.getElementById('set-name-btn');
		        const createBtn = document.getElementById('create-btn');

		        // 1. 名前決定ボタンの処理
		        setNameBtn.onclick = () => {
		            const userName = nameInput.value.trim();
		            if (!userName) return alert("名前を入力してください");
		            
		            sessionStorage.setItem('landmine_name', userName);
		            nameArea.style.display = 'none';

		            if (roomId) {
		                joinRoom(userName); // ゲスト参加フロー
		            } else {
		                createArea.style.display = 'block'; // 部屋作成ボタンを表示
		            }
		        };

		        // 2. 部屋作成ボタンの処理
		        createBtn.onclick = () => {
		            const newRoomRef = push(ref(db, 'rooms'));
		            window.location.href = `lobby.html?room=${newRoomRef.key}`;
		        };

		        // 3. 初期状態の判定
		        if (roomId) {
		            if (savedName) {
		                // 名前が既にあるなら入力画面を隠して即参加
		                nameArea.style.display = 'none';
		                joinRoom(savedName);
		            } else {
		                // 名前がないなら入力画面を表示
		                nameArea.style.display = 'block';
		            }
		        } else {
		            // 部屋IDがないなら入力画面を表示
		            nameArea.style.display = 'block';
		        }
		    };

        function joinRoom(userName) {
            roomInfo.style.display = 'block';
            const roomRef = ref(db, `rooms/${roomId}`);
            const playersRef = ref(db, `rooms/${roomId}/players`);
            const hostRef = ref(db, `rooms/${roomId}/hostId`);
            const statusRef = ref(db, `rooms/${roomId}/status`);
            
            // 自分のプレイヤーデータをプッシュ
            const myPlayerRef = push(playersRef);
            const myPlayerKey = myPlayerRef.key;

            // QRコードとURL表示
            const currentUrl = window.location.href;
            document.getElementById('room-url').textContent = currentUrl;
            document.getElementById('copy-btn').onclick = () => navigator.clipboard.writeText(currentUrl);
            new QRCode(document.getElementById("qrcode"), roomId);

            // 参加登録と離脱時削除
            set(myPlayerRef, { name: `${userName}_${myPlayerKey.slice(-4)}` });

            // 1. 離脱時の処理（単純な削除のみ）
            onDisconnect(myPlayerRef).remove();
            
            // 2. ホストが離脱したとき、自動的に hostId を null にする予約
            // ※ホストのクライアント側でこの予約を仕込んでおく
            onDisconnect(hostRef).remove(); 

            // 3. ホスト選出ロジック
            // 全員が hostRef を監視し、もし空なら自分が立候補する
            onValue(hostRef, (snapshot) => {
                const currentHost = snapshot.val();
                
                // ホストがいない、またはホストが既にいない（削除された）場合
                if (!currentHost) {
                    // トランザクションで立候補
                    runTransaction(hostRef, (current) => {
                        if (current === null) return myPlayerKey; // 自分が新しいホストになる
                        return current; // すでに誰かになっている場合はそのまま
                    });
                }
            });

            // 最初の参加者ならホストになる（トランザクション）
            runTransaction(hostRef, (current) => current || myPlayerKey);

            // ゲーム開始監視
            onValue(statusRef, (snapshot) => {
                if (snapshot.val() === 'started') window.location.href = `landmine.html?room=${roomId}`;
            });

            // ロビー状態の監視
            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                
                // 部屋が削除された場合、強制的にリロードしてロビーの初期状態に戻す
                if (!data) {
                    window.location.href = 'lobby.html';
                    return;
                }

                // プレイヤーリスト表示
                const list = document.getElementById('player-list');
                list.innerHTML = '';
                Object.entries(data.players || {}).forEach(([key, val]) => {
                    const li = document.createElement('li');
                    li.textContent = val.name + (key === data.hostId ? " (Host)" : "");
                    list.appendChild(li);
                });

                // ホスト判定とボタン制御
                const startBtn = document.getElementById('start-btn');
								if (data.hostId === myPlayerKey) {
								    if (!document.getElementById('start-btn')) {
								        const btn = document.createElement('button');
								        btn.id = 'start-btn';
								        btn.textContent = "ゲーム開始";

												btn.onclick = async () => {
												    // 1. 部屋全体のデータを最新状態で取得する
												    const roomSnapshot = await get(ref(db, `rooms/${roomId}`));
												    const roomData = roomSnapshot.val();

												    if (roomData && roomData.players) {
												        // 2. 部屋にある全プレイヤーデータを取得
												        const allPlayers = roomData.players;
												        
												        // 3. ゲーム用パスに全プレイヤーをコピー
												        await set(ref(db, `rooms/${roomId}/game/players`), allPlayers);
												        
												        // 4. ゲーム開始ステータスを更新
												        await update(ref(db, `rooms/${roomId}`), { status: 'started' });
												    } else {
												        console.error("プレイヤーデータが見つかりません");
												    }
												};
								        document.body.appendChild(btn);
								    }
								} else {
                    if (startBtn) startBtn.remove();
                }
            });
        }

				// 部屋作成ボタンの処理
				document.getElementById('create-btn').onclick = () => {
				    const newRoomRef = push(ref(db, 'rooms'));
				    // 部屋作成時に、名前を保持したままリダイレクト
				    window.location.href = `lobby.html?room=${newRoomRef.key}`;
				};
    </script>
</head>
<body>
    <h1>Landmine ロビー</h1>
    <div id="name-area">
        <input type="text" id="name-input" placeholder="名前を入力" maxlength="10">
        <button id="set-name-btn">決定</button>
    </div>
    <div id="create-area" style="display:none;">
        <button id="create-btn">部屋を作成</button>
    </div>
    <div id="room-info" style="display:none;">
        <p>招待URL: <span id="room-url"></span> <button id="copy-btn">URLをコピー</button></p>
        <div id="qrcode"></div>
        <ul id="player-list"></ul>
    </div>
</body>
</html>
