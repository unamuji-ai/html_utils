<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキスト変形ツール</title>
    <style>
        body { background: #1a1a1a; color: #eee; padding: 20px; }
        /* ここが重要：等幅フォントを強制し、文字間隔を揃える */
				#output {
				    white-space: pre;
				    font-family: "MS Gothic", "Osaka-Mono", monospace;
				    font-size: clamp(12px, 4vw, 18px); /* 画面幅に応じて12px〜18pxで自動調整 */
				    line-height: 1.2;
				    background: #000;
				    padding: 15px;
				    border: 1px solid #555;
				    overflow-x: auto; /* はみ出たらスクロール */
				    max-width: 100vw;
				    box-sizing: border-box;
				}

    </style>
</head>
<body>
    <textarea id="input" rows="3" cols="30">日本語テキストです</textarea>
    <select id="mode">
        <option value="vertical">縦書き</option>
        <option value="flip">左右反転</option>
        <option value="diagonal">斜め</option>
        <option value="spiral">うずまき</option>
    </select>
    <button onclick="transform()">変換</button>
    <div id="output"></div>
		<button onclick="copyToClipboard()">結果をコピー</button>

    <script>
        function transform() {
            const text = document.getElementById('input').value;
            const mode = document.getElementById('mode').value;
            const output = document.getElementById('output');
            
            let result = "";
            if (mode === 'vertical') {
                result = verticalTransform(text);

            } else if (mode === 'flip') {
								result = flipTransform(text);

            } else if (mode === 'diagonal') {
								result = diagonalTransform(text);

            } else if (mode === 'spiral') {
                result = spiralTransform(text);

            }
            output.textContent = result;
        }

				// 全角変換の際に、文字間にスペースを挿入するオプション
				function toFullWidth(str, addSpace = false) {
				    let converted = str.replace(/[\u0020-\u007e]/g, (s) => {
				        return String.fromCharCode(s.charCodeAt(0) + 0xFEE0);
				    }).replace(/[\uff61-\uff9f]/g, (s) => {
				        const half = "｡｢｣､･ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝﾞﾟ";
				        const full = "。「」、・ヲァィゥェォャュョッーアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン゛゜";
				        const idx = half.indexOf(s);
				        return idx > -1 ? full[idx] : s;
				    });
				    
				    return addSpace ? converted.split('').join(' ') : converted;
				}

				function verticalTransform(text) {
				    // 全角に変換してから、改行で分割
				    const columns = text.split('\n').map(col => toFullWidth(col));
				    
				    const maxLen = Math.max(...columns.map(col => col.length));
				    
				    let result = "";
				    for (let i = 0; i < maxLen; i++) {
				        let rowStr = "";
				        // 右から左へ（jを逆順に）
				        for (let j = columns.length - 1; j >= 0; j--) {
				            rowStr += (columns[j][i] || "　");
				        }
				        result += rowStr + "\n";
				    }
				    return result;
				}

				function flipTransform(text) {
				    // 改行で分割し、各行を個別に処理する
				    return text.split('\n').map(line => {
				        // 1. 行内の文字を全角変換
				        const fullLine = toFullWidth(line);
				        // 2. 文字列を逆順にする
				        return fullLine.split('').reverse().join('');
				    }).join('\n'); // 3. 元の改行位置で結合
				}


function diagonalTransform(text) {
    const lines = text.split('\n');
    let grid = [];
    let r = 0, c = 0; // 現在の座標

    for (let i = 0; i < lines.length; i++) {
        const fullLine = toFullWidth(lines[i]);
        
        // 【改行の処理】
        // 2行目以降の開始時、または改行後は「現在の全体の最大列数」まで右にジャンプする
        if (i > 0) {
            let maxCol = 0;
            grid.forEach(row => { if (row) maxCol = Math.max(maxCol, row.length); });
            r = 0;
            c = maxCol;
        }

        for (let char of fullLine) {
            // 1. 配置場所の確保：埋まっていたら右へずらす（次の対角線の開始へ）
            while (grid[r] && grid[r][c] !== undefined) {
                r = 0;
                c++;
            }

            // 2. 配置
            if (!grid[r]) grid[r] = [];
            grid[r][c] = char;

            // 3. 次の配置場所（左下優先）
            // r+1 < 10 (行制限) かつ c-1 >= 0 (左端制限) かつ 左下が空いている
            if (r + 1 < 10 && c - 1 >= 0 && (!grid[r + 1] || grid[r + 1][c - 1] === undefined)) {
                r++;
                c--;
            } else {
                // 左下に行けないなら、0行目の「次に空いている右側」へ
                r = 0;
                c = findNextAvailableCol(grid, c + 1);
            }
        }
    }

    function findNextAvailableCol(grid, startFrom) {
        let col = startFrom;
        while (grid[0] && grid[0][col] !== undefined) {
            col++;
        }
        return col;
    }

    // 文字列化
    let maxCols = 0;
    grid.forEach(row => { if (row) maxCols = Math.max(maxCols, row.length); });
    let result = [];
    for (let r = 0; r < grid.length; r++) {
        let rowStr = "";
        for (let col = 0; col < maxCols; col++) {
            rowStr += (grid[r] && grid[r][col] !== undefined) ? grid[r][col] : "　";
        }
        result.push(rowStr);
    }
    return result.join('\n');
}


				function spiralTransform(text) {
				    const fullText = toFullWidth(text.replace(/\n/g, ''));
				    const n = Math.ceil(Math.sqrt(fullText.length));
				    const grid = Array.from({ length: n }, () => Array(n).fill('　'));
				    
				    let top = 0, bottom = n - 1, left = 0, right = n - 1;
				    let index = 0;

				    while (top <= bottom && left <= right && index < fullText.length) {
				        // 右へ
				        for (let i = left; i <= right && index < fullText.length; i++) grid[top][i] = fullText[index++];
				        top++;
				        // 下へ
				        for (let i = top; i <= bottom && index < fullText.length; i++) grid[i][right] = fullText[index++];
				        right--;
				        // 左へ
				        for (let i = right; i >= left && index < fullText.length; i--) grid[bottom][i] = fullText[index++];
				        bottom--;
				        // 上へ
				        for (let i = bottom; i >= top && index < fullText.length; i--) grid[i][left] = fullText[index++];
				        left++;
				    }
				    return grid.map(row => row.join('')).join('\n');
				}


				function copyToClipboard() {
				    const text = document.getElementById('output').textContent;
				    navigator.clipboard.writeText(text).then(() => {
				        alert("コピーしました！");
				    });
				}

    </script>
</body>
</html>
