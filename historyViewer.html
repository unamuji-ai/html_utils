<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Project History Viewer</title>
    <style>
        body { font-family: sans-serif; display: flex; gap: 20px; padding: 20px; height: 90vh; }
        #sidebar { width: 350px; display: flex; flex-direction: column; gap: 10px; }
        #historyView { flex-grow: 1; border: 1px solid #ccc; padding: 20px; overflow-y: auto; background: #f9f9f9; }
        input { padding: 8px; width: 100%; box-sizing: border-box; }
        .tool-item { cursor: pointer; padding: 12px; border-bottom: 1px solid #ddd; background: white; }
        .tool-item:hover { background: #e7f3ff; }
        .log-entry { margin-bottom: 20px; border-left: 4px solid #007bff; padding-left: 15px; background: white; padding: 10px; }
        .tag { font-size: 0.8em; background: #eee; padding: 2px 6px; border-radius: 4px; margin-right: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>ツール検索</h2>
    <input type="text" id="searchInput" placeholder="タイトルやタグで検索..." oninput="filterTools()">
    <div id="list" style="overflow-y: auto;"></div>
</div>

<div id="historyView">
    <h2 id="selectedToolTitle">ツールを選択してください</h2>
    <div id="toolDetails"></div>
    <h3>開発履歴 (Logs)</h3>
    <div id="logs"></div>
</div>

<script>
    let allData = { tools: [], logs: [] };

    fetch('history.json')
        .then(res => res.json())
        .then(data => {
            allData = data;
            renderList(data.tools);
        });

    function renderList(tools) {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';
        tools.forEach(tool => {
            const div = document.createElement('div');
            div.className = 'tool-item';
            div.innerHTML = `<strong>${tool.title}</strong><br>${tool.tags.map(t => `<span class="tag">${t}</span>`).join('')}`;
            div.onclick = () => showTool(tool);
            listDiv.appendChild(div);
        });
    }

    function filterTools() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.tools.filter(t => 
            t.title.toLowerCase().includes(query) || 
            t.tags.some(tag => tag.toLowerCase().includes(query))
        );
        renderList(filtered);
    }

    function showTool(tool) {
        document.getElementById('selectedToolTitle').textContent = tool.title;
        document.getElementById('toolDetails').innerHTML = `
            <p><strong>目的:</strong> ${tool.details.purpose}</p>
            <p><strong>概要:</strong> ${tool.details.summary}</p>
            <p><strong>依存関係:</strong> ${tool.dependencies.join(', ')}</p>`;
        
        const logsDiv = document.getElementById('logs');
        logsDiv.innerHTML = '';
        const logs = allData.logs.filter(l => l.tool_id === tool.id);
        logs.forEach(log => {
            logsDiv.innerHTML += `
                <div class="log-entry">
                    <strong>${log.date} (v${log.version}) - ${log.event}</strong>
                    <p>${log.note}</p>
                </div>`;
        });
    }
</script>
</body>
</html>
