<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマホ最適化くじ引き</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            text-align: center;
            margin: 0;
            background-color: #f0f2f5;
            color: #333;
            overscroll-behavior: none;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            width: 95%;
            max-width: 450px;
            margin: 15px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        h2 { font-size: 1.3rem; margin-bottom: 20px; color: #2c3e50; }

        /* --- 入力エリア --- */
        .name-input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        #nameInput {
            flex-grow: 1;
            padding: 12px;
            font-size: 16px; /* iOSのズーム防止 */
            border: 2px solid #edf2f7;
            border-radius: 10px;
            background-color: #f8fafc;
            outline: none;
        }
        #addNameButton {
            padding: 0 20px;
            background-color: #48bb78;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }

        #nameList {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            max-height: 25vh;
            overflow-y: auto;
            border: 1px solid #edf2f7;
            border-radius: 10px;
        }
        #nameList li {
            padding: 12px 15px;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }

        /* --- ルーレットエリア --- */
        .roulette-display-wrapper {
            position: relative;
            width: 75vw;
            height: 75vw;
            max-width: 320px;
            max-height: 320px;
            margin: 40px auto;
        }
        .pointer {
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 35px solid #e53e3e;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        .roulette {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #2d3748;
            position: relative;
            overflow: hidden;
            background-color: #fff;
        }

        /* ボタン・結果表示 */
        .primary-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .primary-btn:active { transform: scale(0.98); }
        .register-btn { background-color: #4299e1; color: white; }
        .spin-btn { background-color: #48bb78; color: white; margin-top: 10px; }
        .back-btn { background: none; color: #718096; border: 1px solid #cbd5e0; margin-top: 20px; padding: 10px; }

        #result {
            margin: 25px 0;
            font-size: 1.4rem;
            font-weight: bold;
            color: #2f855a;
            min-height: 1.6em;
        }

        #registeredNamesDisplay {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            margin-bottom: 10px;
        }
        .name-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            color: #4a5568;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="inputSection">
            <h2>参加者を登録</h2>
            <div class="name-input-group">
                <input type="text" id="nameInput" placeholder="名前を入力" enterkeyhint="done">
                <button id="addNameButton">追加</button>
            </div>
            <ul id="nameList"></ul>
            <button class="primary-btn register-btn" id="registerButton" disabled>登録完了（ルーレットへ）</button>
        </div>

        <div id="rouletteSection" style="display:none;">
            <div id="registeredNamesDisplay"></div>
            <div class="roulette-display-wrapper">
                <div class="pointer"></div>
                <div class="roulette" id="roulette"></div>
            </div>
            <div id="result">準備完了！</div>
            <button class="primary-btn spin-btn" id="spinButton">ルーレットを回す</button>
            <button class="primary-btn back-btn" id="backButton">名前入力に戻る</button>
        </div>
    </div>

    <script>
        const inputSection = document.getElementById('inputSection');
        const rouletteSection = document.getElementById('rouletteSection');
        const nameInput = document.getElementById('nameInput');
        const addNameButton = document.getElementById('addNameButton');
        const nameList = document.getElementById('nameList');
        const registerButton = document.getElementById('registerButton');
        const roulette = document.getElementById('roulette');
        const spinButton = document.getElementById('spinButton');
        const backButton = document.getElementById('backButton');
        const resultDisplay = document.getElementById('result');
        const registeredNamesDisplay = document.getElementById('registeredNamesDisplay');

        let names = [];
        let nameEmojis = {};
        let currentRotation = 0;
        const emojis = ['🎉', '✨', '🎁', '🎈', '🌟', '🍀', '🍎', '🍊', '🍓', '🍇', '🐶', '🐱', '🐰', '🦁', '🐸', '🐼', '🦄', '🐝'];

        // 名前の追加
        addNameButton.onclick = () => {
            const name = nameInput.value.trim();
            if (name && !names.includes(name)) {
                names.push(name);
                nameEmojis[name] = emojis[Math.floor(Math.random() * emojis.length)];
                updateList();
                nameInput.value = '';
            }
        };

        function updateList() {
            nameList.innerHTML = names.map(n => `
                <li>
                    <span>${nameEmojis[n]} ${n}</span>
                    <span onclick="removeName('${n}')" style="color:#e53e3e; padding:5px 10px;">✕</span>
                </li>
            `).join('');
            registerButton.disabled = names.length < 2;
        }

        window.removeName = (name) => {
            names = names.filter(n => n !== name);
            updateList();
        };

        // 登録完了
        registerButton.onclick = () => {
            inputSection.style.display = 'none';
            rouletteSection.style.display = 'block';
            resultDisplay.innerHTML = 'ルーレットを回してください！';
            renderRoulette();
        };

        function renderRoulette() {
            roulette.innerHTML = '';
            registeredNamesDisplay.innerHTML = names.map(n => `<span class="name-tag">${n}</span>`).join('');
            
            const angleStep = 360 / names.length;
            names.forEach((name, i) => {
                const segment = document.createElement('div');
                segment.style.position = 'absolute';
                segment.style.width = '100%';
                segment.style.height = '100%';
                segment.style.backgroundColor = `hsl(${i * (360 / names.length)}, 75%, 88%)`;
                
                // クリップパス
                const start = i * angleStep;
                const end = (i + 1) * angleStep;
                const path = ['50% 50%'];
                for (let a = start; a <= end; a += 1) {
                    const r = (a - 90) * Math.PI / 180;
                    path.push(`${50 + 50 * Math.cos(r)}% ${50 + 50 * Math.sin(r)}%`);
                }
                segment.style.clipPath = `polygon(${path.join(',')})`;

                // テキスト
                const mid = start + angleStep / 2;
                const label = document.createElement('div');
                label.style.position = 'absolute';
                label.style.top = '50%'; label.style.left = '50%';
                label.style.width = '80px';
                label.style.textAlign = 'center';
                label.style.transform = `translate(-50%, -50%) rotate(${mid}deg) translateY(-85px) rotate(${-mid}deg)`;
                label.innerHTML = `<div style="font-size:11px; font-weight:bold;">${name}</div><div style="font-size:16px;">${nameEmojis[name]}</div>`;
                
                segment.appendChild(label);
                roulette.appendChild(segment);
            });
        }

				let velocity = 0;
				let isSpinning = false;

        // 回転ロジック
        spinButton.onclick = () => {
            if (names.length < 2) return;
            
            spinButton.disabled = true;
            backButton.disabled = true;
            resultDisplay.innerHTML = '抽選中...';


				    velocity = Math.random() * 50 + 80;

				    function animate() {
				        // 回転させる
				        currentRotation += velocity;
				        roulette.style.transform = `rotate(${currentRotation}deg)`;

				        // 摩擦（少しずつ減速）
				        velocity *= 0.97;

				        // 【演出】速度が一定以下（かつ止まりそう）な時、確率で再加速！
				        if (velocity < 0.5 && velocity > 0.1 && Math.random() < 0.02) {
				            velocity += Math.random() * 20 + 5; // 再加速！
				        }

				        // 停止判定（速度が十分小さくなったら止める）
				        if (velocity > 0.1) {
				            requestAnimationFrame(animate);
				        } else {
				            isSpinning = false;
				            spinButton.disabled = false;
				            backButton.disabled = false;
				            
				            // 当選者特定
				            const finalAngle = currentRotation % 360;
				            const sectorAngle = 360 / names.length;
				            const winningIndex = Math.floor(((360 - finalAngle) % 360) / sectorAngle);
				            const winner = names[winningIndex];
				            
				            resultDisplay.innerHTML = `当選：${winner} ${nameEmojis[winner]}`;
				        }
				    }
				    animate();
        };

        backButton.onclick = () => {
            rouletteSection.style.display = 'none';
            inputSection.style.display = 'block';
            currentRotation = 0;
            roulette.style.transition = 'none';
            roulette.style.transform = 'rotate(0deg)';
            setTimeout(() => roulette.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.15, 1)', 50);
        };
    </script>
</body>
</html>
